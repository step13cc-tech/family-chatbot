<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>家族チャット（Groq）</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #0f1115; color: #e8e8e8; }
    body { max-width: 640px; margin: 0 auto; padding: 1.5rem; display: flex; flex-direction: column; height: 100dvh; box-sizing: border-box; }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    .hint { color: #9ca3af; font-size: 0.875rem; margin-bottom: 0.75rem; }
    .model-row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .model-row label { font-size: 0.875rem; color: #9ca3af; }
    #model { flex: 1; min-width: 200px; padding: 0.5rem; border-radius: 8px; border: 1px solid #444; background: #1a1d24; color: inherit; }
    #log { flex: 1; overflow-y: auto; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .msg { margin-bottom: 0.75rem; }
    .msg.user { color: #93c5fd; }
    .msg.bot { color: #86efac; }
    .model-tag { font-size: 0.75rem; color: #9ca3af; }
    form { display: flex; gap: 0.5rem; }
    input[type="text"] { flex: 1; padding: 0.75rem; border-radius: 8px; border: 1px solid #444; background: #1a1d24; color: inherit; }
    button { padding: 0.75rem 1rem; border-radius: 8px; border: none; background: #3b82f6; color: #fff; cursor: pointer; }
    button:disabled { opacity: 0.5; }
    #clear { background: #374151; margin-top: 0.5rem; width: 100%; }
  </style>
</head>
<body>
  <h1>家族チャット</h1>
  <p class="hint">Groq の LLM を選んで会話できます。会話はこのブラウザにだけ保存されます。</p>
  <div class="model-row">
    <label for="model">LLM:</label>
    <select id="model" aria-label="使用する LLM"></select>
  </div>
  <div id="log"><p class="hint">ここに会話が表示されます。</p></div>
  <p id="status" class="hint">読み込み中…</p>
  <form id="form">
    <input id="input" type="text" placeholder="メッセージを入力…" autocomplete="off" required />
    <button type="submit" id="send">送信</button>
  </form>
  <button type="button" id="clear">会話を消す</button>

  <script>
    const STORAGE_KEY = "familyChatHistory";
    const MODEL_KEY = "familyChatModel";
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const clearBtn = document.getElementById("clear");
    const status = document.getElementById("status");
    const modelSelect = document.getElementById("model");

    let history = [];
    let modelLabels = {};

    try {
      history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      if (!Array.isArray(history)) history = [];
    } catch {
      history = [];
      localStorage.removeItem(STORAGE_KEY);
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function saveModel() {
      localStorage.setItem(MODEL_KEY, modelSelect.value);
    }

    function render() {
      if (history.length === 0) {
        log.innerHTML = '<p class="hint">ここに会話が表示されます。下にメッセージを入力して送信してください。</p>';
        return;
      }
      log.innerHTML = history.map((m) => {
        const tag = m.model
          ? `<div class="model-tag">[${escapeHtml(modelLabels[m.model] || m.model)}]</div>`
          : "";
        return (
          `<div class="msg ${m.role === "user" ? "user" : "bot"}">` +
          `<strong>${m.role === "user" ? "あなた" : "ボット"}:</strong> ` +
          escapeHtml(m.content) + tag + "</div>"
        );
      }).join("");
      log.scrollTop = log.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    async function loadModels() {
      const res = await fetch("/api/models");
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "モデル一覧の取得に失敗しました");

      modelSelect.innerHTML = "";
      data.models.forEach((m) => {
        modelLabels[m.id] = m.label;
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.label;
        modelSelect.appendChild(opt);
      });

      const saved = localStorage.getItem(MODEL_KEY);
      const initial = saved && data.models.some((m) => m.id === saved) ? saved : data.default;
      modelSelect.value = initial;
      modelSelect.addEventListener("change", saveModel);
    }

    loadModels()
      .then(() => {
        if (status) status.textContent = "準備完了 — LLM を選んでメッセージを送信";
        render();
      })
      .catch((err) => {
        if (status) status.textContent = "エラー: " + err.message;
      });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      const model = modelSelect.value;
      history.push({ role: "user", content: text });
      save();
      render();
      input.value = "";
      sendBtn.disabled = true;
      modelSelect.disabled = true;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            history: history.slice(0, -1),
            model,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        history.push({ role: "assistant", content: data.reply, model: data.model });
        save();
        render();
      } catch (err) {
        history.pop();
        save();
        render();
        alert("エラー: " + err.message);
      } finally {
        sendBtn.disabled = false;
        modelSelect.disabled = false;
        input.focus();
      }
    });

    clearBtn.addEventListener("click", () => {
      if (!confirm("会話をすべて消しますか？")) return;
      history = [];
      save();
      render();
    });
  </script>
</body>
</html>
